<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>腰のセルフケア</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#15191a;
    color:#e8e6e0;
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",Meiryo,sans-serif;
    line-height:1.8;
    padding:28px 18px 60px;
    max-width:560px;
    margin:0 auto;
  }
  h1 {
    text-align:center;
    font-size:28px;
    font-weight:800;
    margin-bottom:30px;
    line-height:1.5;
  }
  .card {
    border-radius:16px;
    margin-bottom:30px;
    overflow:hidden;
    border:1px solid #2c3335;
  }
  .band {
    padding:14px 20px;
    color:#fff;
    font-size:22px;
    font-weight:800;
  }
  .band.brown { background:#b5742a; }
  .band.green { background:#0c6b56; }
  .body { padding:20px; background:#1b2022; }
  .fig {
    background:#15191a;
    border-radius:12px;
    padding:16px 8px;
    margin-bottom:16px;
    text-align:center;
  }
  .fig svg { max-width:100%; height:auto; }
  .big {
    font-size:24px;
    font-weight:800;
    color:#FFE066;
    text-align:center;
    margin-bottom:14px;
  }
  .point {
    font-size:19px;
    padding:10px 0 10px 38px;
    position:relative;
  }
  .point::before {
    content:"○";
    color:#4ade80;
    font-weight:800;
    position:absolute;
    left:6px;
    font-size:20px;
  }
  .ng {
    margin-top:14px;
    background:#2a1d1b;
    border-left:5px solid #ff7a6b;
    padding:12px 16px;
    border-radius:8px;
    font-size:18px;
    font-weight:700;
    color:#ff9a8b;
  }
  .tip {
    display:flex;
    align-items:center;
    gap:16px;
    padding:14px 0;
    border-bottom:1px dashed #2c3335;
  }
  .tip:last-child { border-bottom:none; }
  .tip .emoji {
    font-size:36px;
    flex-shrink:0;
    width:48px;
    text-align:center;
  }
  .tip .txt { font-size:19px; font-weight:600; }
  .tip .txt small {
    display:block;
    font-size:15px;
    color:#9aa4a6;
    font-weight:400;
  }
  .kw { color:#FFE066; font-weight:800; }
  .footer {
    text-align:center;
    color:#7ee0b8;
    font-size:17px;
    margin-top:10px;
    line-height:2;
  }
</style>
</head>
<body>

<h1>腰をまもる<br>おうちケア と 新幹線</h1>

<!-- 膝抱え -->
<div class="card">
  <div class="band brown">おうちで：片ひざ抱え</div>
  <div class="body">
    <div class="fig">
      <svg viewBox="0 0 480 220" width="480" height="220" xmlns="http://www.w3.org/2000/svg">
        <!-- floor -->
        <line x1="30" y1="195" x2="450" y2="195" stroke="#3a4245" stroke-width="10" stroke-linecap="round"/>
        <!-- head -->
        <circle cx="90" cy="170" r="22" fill="#7ee0b8"/>
        <!-- body lying flat -->
        <line x1="112" y1="176" x2="270" y2="180" stroke="#7ee0b8" stroke-width="16" stroke-linecap="round"/>
        <!-- straight leg -->
        <line x1="270" y1="180" x2="430" y2="184" stroke="#7ee0b8" stroke-width="12" stroke-linecap="round"/>
        <!-- thigh: hip → knee (toward chest, up-forward) -->
        <line x1="270" y1="180" x2="210" y2="105" stroke="#7ee0b8" stroke-width="12" stroke-linecap="round"/>
        <!-- shin: knee → foot folded back toward buttocks -->
        <line x1="210" y1="105" x2="262" y2="158" stroke="#7ee0b8" stroke-width="11" stroke-linecap="round"/>
        <!-- foot -->
        <line x1="262" y1="158" x2="277" y2="150" stroke="#7ee0b8" stroke-width="9" stroke-linecap="round"/>
        <!-- one arm hugging over the knee/shin -->
        <path d="M135 152 Q175 95 225 118" stroke="#FFE066" stroke-width="9" fill="none" stroke-linecap="round"/>
        <!-- arrow: knee pulled toward chest (down-left toward head) -->
        <path d="M250 55 L218 88" stroke="#FFE066" stroke-width="5" stroke-linecap="round"/>
        <path d="M218 88 l15 -3 l-9 -12 z" fill="#FFE066"/>
        <text x="262" y="52" fill="#FFE066" font-size="22" font-weight="bold">ひざを胸へ</text>
      </svg>
    </div>
    <div class="big">軽く引いて 20秒 × 2回<br>（朝 と 寝る前）</div>
    <div class="point">あお向けで、<span class="kw">両手でひざ</span>を抱える</div>
    <div class="point">息は<span class="kw">止めない</span></div>
    <div class="point">右がすんだら<span class="kw">左も</span></div>
    <div class="ng">× グイグイ引かない　× 反動をつけない</div>
  </div>
</div>

<!-- 新幹線 -->
<div class="card">
  <div class="band green">新幹線の日</div>
  <div class="body">
    <div class="tip">
      <div class="emoji">🧳</div>
      <div class="txt">荷物は<span class="kw">足元</span>へ
        <small>網棚に持ち上げない</small>
      </div>
    </div>
    <div class="tip">
      <div class="emoji">🧻</div>
      <div class="txt"><span class="kw">丸めたタオル</span>を腰のうしろに
        <small>深く腰かける</small>
      </div>
    </div>
    <div class="tip">
      <div class="emoji">🚶</div>
      <div class="txt"><span class="kw">30〜40分に1回</span>歩く
        <small>デッキまででOK</small>
      </div>
    </div>
    <div class="tip">
      <div class="emoji">🔥</div>
      <div class="txt"><span class="kw">貼るカイロ</span>を右腰に
        <small>肌に直接貼らない</small>
      </div>
    </div>
  </div>
</div>

<div class="footer">
  痛みが強くなったら無理せずご連絡ください。<br>
  よい東京旅行を！
</div>

</body>
</html>
